name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build binaries
        run: |
          mkdir -p dist
          VER="${GITHUB_REF_NAME}"
          LD="-s -w -X main.version=${VER}"
          GOOS=windows GOARCH=amd64 go build -ldflags="$LD" -o dist/dragnet-windows-amd64.exe ./cmd/dragnet
          GOOS=windows GOARCH=arm64 go build -ldflags="$LD" -o dist/dragnet-windows-arm64.exe ./cmd/dragnet
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LD" -o dist/dragnet-linux-amd64       ./cmd/dragnet
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LD" -o dist/dragnet-darwin-arm64      ./cmd/dragnet
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
